name: youplot
description: "Sports route planner with Mapbox, elevation data, and multi-format export."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8
  get_it: ^7.6.7
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  mapbox_maps_flutter: ^2.3.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  xml: ^6.5.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  dartz: ^0.10.1
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mockito: ^5.4.4

flutter:
  uses-material-design: true
