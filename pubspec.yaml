name: youplot
description: "Sports route planner with Mapbox, elevation data, and multi-format export."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  animated_text_kit: ^4.3.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.4.3
  equatable: ^2.0.5
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.0
  flutter_bloc: ^8.1.5
  flutter_dotenv: ^6.0.1
  froom: ^4.0.0
  gap: ^3.0.1
  geolocator: ^11.0.0
  get_it: ^7.6.7
  google_fonts: ^6.2.1
  intl: ^0.19.0
  mapbox_maps_flutter: ^2.3.0
  path_provider: ^2.1.3
  pdf: ^3.10.8
  permission_handler: ^11.3.1
  pretty_dio_logger: ^1.3.1
  shared_preferences: ^2.2.3
  share_plus: ^10.0.0
  shimmer: ^3.0.0
  styled_widget: ^0.4.1
  sqflite: ^2.4.2
  uuid: ^4.4.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.10.1
  flutter_lints: ^6.0.0
  froom_generator: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
